<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assessment: Hemoglobin Estimation by Sahli’s Method</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../style.css">
  <style>
    body { padding-top: var(--nav-h); }
    .container { max-width:800px; margin:24px auto 48px; background:var(--card-bg); border-radius:var(--radius); padding:1.75rem 2rem; box-shadow:var(--shadow-sm); border:1px solid var(--border); }
    .student-info label { display:block; margin:.5em 0 .2em; font-weight:600; color:var(--blue-dark); font-size:.9rem; }
    .student-info input, .student-info select { width:100%; padding:.55em; margin-bottom:.8em; border:1.5px solid var(--border); border-radius:var(--radius-sm); background:#f9fbff; font-size:.95rem; font-family:var(--font); }
    .student-info input:focus, .student-info select:focus { outline:none; border-color:var(--blue); }
    .assignment-upload { background:var(--blue-light); padding:1em; border-radius:var(--radius-sm); border:1px solid var(--blue-mid); margin:1em 0 2em; }
    .assignment-status { font-size:.9em; margin-top:.4em; color:#1b5e20; }
    .note { font-size:.8em; color:var(--muted); margin-top:.2em; }
    .question { margin-bottom:1.4em; font-size:.95rem; color:var(--ink); }
    img.question-img { max-width:400px; display:block; margin:.4em 0 1em; border-radius:8px; box-shadow:var(--shadow-sm); }
    label.dropdown-label { display:inline-block; min-width:70px; }
    .declaration { margin:2em 0 1em; font-size:.9rem; }
    .submit-btn { padding:.85em 2em; font-size:1em; border:none; background:var(--blue); color:#fff; border-radius:var(--radius-sm); cursor:pointer; font-weight:700; transition:background var(--trans); }
    .submit-btn:hover { background:var(--blue-dark); }
    .submit-btn:disabled { background:var(--blue-mid); cursor:not-allowed; }
    .error { color:#c62828; margin-top:1em; font-weight:500; font-size:.9rem; }
    .result { margin-top:1.2em; color:var(--blue-deeper); font-size:1em; font-weight:600; min-height:1.2em; }
    .block-access-msg { border-radius:var(--radius-sm); background:#ffebee; color:#b71c1c; border:1px solid #ffcdd2; font-size:1em; margin:24px auto; padding:1.25em 1.5em; text-align:center; max-width:800px; font-weight:600; }
    .block-access-msg a { color:#b71c1c; text-decoration:underline; }
    .admin-banner { margin:0 auto 14px; max-width:800px; background:#fff8e1; color:#8d6e63; border:1px solid #ffe0b2; border-radius:var(--radius-sm); padding:10px 12px; font-size:.9em; }
    @media (max-width:600px) { .container { padding:1.2rem 1rem; } img.question-img { max-width:100%; } }
  </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>

</head>
<body>

  <!-- SITE NAVIGATION -->
  <nav class="site-nav" id="site-nav">
    <a href="../index.html" class="site-nav__brand">
      <div class="site-nav__logo" aria-hidden="true">🫀</div>
      <div>
        <div class="site-nav__title">Anatomy &amp; Physiology Portal</div>
        <div class="site-nav__subtitle">Learning Management System</div>
      </div>
    </a>
    <div class="site-nav__links">
      <a href="../index.html"       class="site-nav__link">🏠 Home</a>
      <a href="../experiments.html" class="site-nav__link">🔬 Experiments</a>
      <a href="../assessments.html" class="site-nav__link active">📝 Assessments</a>
      <a href="../references.html"  class="site-nav__link">📚 References</a>
    </div>
    <div class="site-nav__actions">
      <a href="../login_Version4.html" class="nav-btn nav-btn--accent">Sign In</a>
    </div>
    <button class="site-nav__toggle" id="nav-toggle" aria-label="Toggle navigation">☰</button>
  </nav>

  <!-- Admin preview banner -->
  <div id="adminBannerMount"></div>

  <!-- Mobile nav toggle -->
  <script>
    (function(){
      const t = document.getElementById('nav-toggle');
      const n = document.getElementById('site-nav');
      if (t && n) {
        t.addEventListener('click', () => n.classList.toggle('site-nav--open'));
        document.addEventListener('click', (e) => { if (!n.contains(e.target)) n.classList.remove('site-nav--open'); });
      }
    })();
  </script>
  <div class="container">
    <form id="assessmentForm" autocomplete="off">
      <div class="student-info">
        <h2>Student Information</h2>
        <label for="studentName">Student Name*</label>
        <input type="text" id="studentName" name="studentName" required>
        <label for="schoolName">School Name*</label>
        <input type="text" id="schoolName" name="schoolName" required>
        <label for="prnNumber">PRN Number*</label>
        <input type="text" id="prnNumber" name="prnNumber" required>
        <label for="batchNumber">Batch Number*</label>
        <select id="batchNumber" name="batchNumber" required>
          <option value="">Select Batch</option>
          <option value="A">A</option>
          <option value="B">B</option>
        </select>
        <label for="emailId">Email ID (add your institutional email id)*</label>
        <input type="email" id="emailId" name="emailId" required>
        <div class="note" id="profileNote"></div>
      </div>
      <!-- Assignment Upload -->
      <div class="assignment-upload">
        <label for="assignmentFile"><b>Upload Assignment (PDF only)*</b></label>
        <input type="file" id="assignmentFile" name="assignmentFile" accept="application/pdf" required>
        <div id="assignmentStatus" class="assignment-status"></div>
        <div class="note">Must finish uploading before submitting the assessment.</div>
      </div>
      <hr>
      <div id="questionsSection"></div>
      <div class="declaration">
        <input type="checkbox" id="declaration" required>
        <label for="declaration">
          I hereby declare that this assessment is for my own progress and benefit. All answers submitted are my own and not generated by AI or provided by friends.
        </label>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Submit</button>
      <div class="error" id="errorMsg"></div>
      <div class="result" id="resultMsg"></div>
    </form>
  </div>
  <script>
    // ---- Supabase Constants & Init ----
    const EXPERIMENT_ID = 'assessment-9-hemoglobin-sahli';
    const ASSESSMENT_TITLE = 'Experiment No. 9 (Hemoglobin Estimation by Sahli’s Method)';
    const ASSIGNMENT_BUCKET = 'assignments';
    const pageStartTime = Date.now();

    let supabaseAvailable = !!(window.supabase && typeof window.supabase.createClient === 'function');
    let sb = null;
    if (supabaseAvailable) {
      try {
        sb = window.supabase.createClient(
          'https://hunlistfklwvpivfjmbk.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1bmxpc3Rma2x3dnBpdmZqbWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc4MzA1NDUsImV4cCI6MjA3MzQwNjU0NX0.e-o_qL1Uf5DpW4gX60ktXyuUXmw5YWhqaw6Cx8Xc8Qs'
        );
      } catch (e) {
        console.warn('Supabase init failed:', e);
        supabaseAvailable = false;
      }
    }

    // ---- Autofill from Profile ----
    async function autofillFromProfile() {
      if (!supabaseAvailable || !sb) return;
      try {
        const { data: { session }, error: sessErr } = await sb.auth.getSession();
        if (sessErr) console.warn('getSession error:', sessErr);
        if (!session?.user) return;

        const uid = session.user.id;
        const { data: profile, error } = await sb
          .from('profiles')
          .select('name, email, prn, batch, school_name')
          .eq('id', uid)
          .maybeSingle();

        if (error) {
          console.warn('Profile fetch error:', error.message);
          return;
        }
        if (!profile) {
          return;
        }

        const studentNameEl = document.getElementById('studentName');
        const schoolNameEl = document.getElementById('schoolName');
        const prnEl = document.getElementById('prnNumber');
        const batchEl = document.getElementById('batchNumber');
        const emailEl = document.getElementById('emailId');

        if (studentNameEl && !studentNameEl.value) studentNameEl.value = profile.name || '';
        if (schoolNameEl && !schoolNameEl.value) schoolNameEl.value = profile.school_name || '';
        if (prnEl && !prnEl.value) prnEl.value = profile.prn || '';
        if (batchEl && !batchEl.value && profile.batch) {
          const match = Array.from(batchEl.options).find(o => (o.value || '').toLowerCase() === String(profile.batch).toLowerCase());
          if (!match && profile.batch) {
            const opt = document.createElement('option');
            opt.value = profile.batch;
            opt.textContent = profile.batch;
            batchEl.appendChild(opt);
          }
          batchEl.value = profile.batch;
        }
        if (emailEl && !emailEl.value) emailEl.value = profile.email || session.user.email || '';
      } catch (e) {
        console.warn('autofillFromProfile error:', e);
      }
    }
    if (supabaseAvailable && sb) {
      sb.auth.onAuthStateChange((_evt, _session) => {
        autofillFromProfile();
      });
      autofillFromProfile();
    }

    // ---- Utility ----
    function shuffleArray(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // ---- Questions ----
    const questions = [
      {
        type: "mcq",
        text: "1. What is the main principle of Sahli’s method for hemoglobin estimation?",
        options: [
          "Hemoglobin is converted to oxyhemoglobin and measured spectrophotometrically",
          "Hemoglobin reacts with dilute HCl to form acid hematin, which is visually matched to a color standard",
          "Hemoglobin precipitates and is weighed",
          "Hemoglobin is oxidized to methemoglobin and measured by its color"
        ],
        answer: "Hemoglobin reacts with dilute HCl to form acid hematin, which is visually matched to a color standard"
      },
      {
        type: "mcq",
        text: "2. What is the color of acid hematin formed in Sahli’s method?",
        options: [
          "Bright red",
          "Dark blue",
          "Brown",
          "Yellow"
        ],
        answer: "Brown"
      },
      {
        type: "mcq",
        text: "3. Which of the following is NOT a step in Sahli’s method?",
        options: [
          "Adding blood to dilute HCl",
          "Adding potassium cyanide",
          "Matching color with a comparator",
          "Measuring the level in the graduated tube"
        ],
        answer: "Adding potassium cyanide"
      },
      {
        type: "mcq",
        text: "4. In Sahli’s method, 0.1 N HCl is used to:",
        options: [
          "Lyse RBCs and convert hemoglobin to acid hematin",
          "Precipitate hemoglobin",
          "Convert hemoglobin to methemoglobin",
          "Dissolve plasma proteins"
        ],
        answer: "Lyse RBCs and convert hemoglobin to acid hematin"
      },
      {
        type: "mcq",
        text: "5. Which of the following conditions can cause a falsely low hemoglobin value in Sahli’s method?",
        options: [
          "Incomplete mixing of blood with acid",
          "Waiting more than 10 minutes before reading",
          "Using distilled water instead of HCl",
          "Overfilling the graduated tube"
        ],
        answer: "Incomplete mixing of blood with acid"
      },
      {
        type: "mcq",
        text: "6. Which type of error is most likely if the color in the tube is matched too rapidly with the comparator?",
        options: [
          "Value will be too high",
          "Value will be too low",
          "No effect on value",
          "Hemoglobin will not react"
        ],
        answer: "Value will be too low"
      },
      {
        type: "mcq",
        text: "7. The hemoglobin pipette in Sahli’s method is used to measure:",
        options: [
          "20 microliters of blood",
          "1 mL of blood",
          "100 microliters of blood",
          "0.5 mL of blood"
        ],
        answer: "20 microliters of blood"
      },
      {
        type: "mcq",
        text: "8. The Sahli-Hellige hemoglobinometer provides a direct reading of hemoglobin concentration in:",
        options: [
          "mg/dL",
          "g/L",
          "g/dL",
          "mm Hg"
        ],
        answer: "g/dL"
      },
      {
        type: "mcq",
        text: "9. Which of the following methods is considered more accurate than Sahli’s method for hemoglobin estimation?",
        options: [
          "Color matching method",
          "Cyanmethemoglobin method",
          "Specific gravity method",
          "Talquist method"
        ],
        answer: "Cyanmethemoglobin method"
      },
      {
        // 10th question replaced by image and dropdowns
        type: "image-labels",
        text: "",
        image: "../assets/images/experiment-9/Assessment/haemoglobin question.png",
        labels: [
          {
            name: "A",
            answer: "Citrate",
            options: [
              "Citrate",
              "Hematin",
              "Water",
              "Bicarbonate"
            ]
          },
          {
            name: "B",
            answer: "Pipette",
            options: [
              "Pipette",
              "Test tube",
              "Beaker",
              "Centrifuge"
            ]
          },
          {
            name: "C",
            answer: "Vertical",
            options: [
              "Vertical",
              "Horizontal",
              "Inclined",
              "Upside down"
            ]
          },
          {
            name: "D",
            answer: "60",
            options: [
              "10",
              "30",
              "60",
              "120"
            ]
          }
        ]
      }
    ];

    questions.forEach(q => {
      if(q.options) shuffleArray(q.options);
      if(q.labels) q.labels.forEach(lab => shuffleArray(lab.options));
    });

    // ---- Render Questions ----
    function renderQuestions(){
      const qs = document.getElementById('questionsSection');
      if(!qs){
        console.error('questionsSection not found in DOM.');
        return;
      }
      qs.innerHTML = '<h2>Assessment Questions</h2>';
      questions.forEach((q, idx) => {
        let html = `<div class="question">`;
        if(q.type === "mcq"){
          html += `<label><b>${q.text}</b></label><br>`;
          q.options.forEach(opt => {
            html += `<label><input type="radio" name="q${idx}" value="${opt}" required> ${opt}</label><br>`;
          });
        } else if(q.type === "dropdown"){
          html += `<select name="q${idx}" required><option value="">Select...</option>`;
          q.options.forEach(opt => { html += `<option value="${opt}">${opt}</option>`; });
          html += '</select>';
        } else if(q.type === "image-labels"){
          // IMAGE + DROPDOWN : NO TITLE, IMAGE ONLY, THEN OPTIONS
          html += `<img src="${q.image}" alt="Assessment Question 10" class="question-img"><br>`;
          html += `<div>`;
          html += `<select name="q${idx}_label0" required><option value="">Select...</option>`;
          q.labels[0].options.forEach(opt => { html += `<option value="${opt}">${opt}</option>`; });
          html += `</select> `;
          html += `<select name="q${idx}_label1" required><option value="">Select...</option>`;
          q.labels[1].options.forEach(opt => { html += `<option value="${opt}">${opt}</option>`; });
          html += `</select> `;
          html += `<select name="q${idx}_label2" required><option value="">Select...</option>`;
          q.labels[2].options.forEach(opt => { html += `<option value="${opt}">${opt}</option>`; });
          html += `</select> `;
          html += `<select name="q${idx}_label3" required><option value="">Select...</option>`;
          q.labels[3].options.forEach(opt => { html += `<option value="${opt}">${opt}</option>`; });
          html += `</select>`;
          html += `</div>`;
        }
        html += '</div>';
        qs.innerHTML += html;
      });
    }
    renderQuestions();

    // ---- Assignment Upload ----
    let uploadedAssignmentPath = null;
    let uploadedAssignmentUrl  = null;
    let uploadingAssignment    = false;

    document.getElementById('assignmentFile').addEventListener('change', async (e) => {
      const statusEl = document.getElementById('assignmentStatus');
      const file = e.target.files[0];
      statusEl.textContent = '';
      uploadedAssignmentPath = null;
      uploadedAssignmentUrl  = null;

      if(!file) return;
      if(file.type !== 'application/pdf'){
        statusEl.textContent = 'Only PDF files allowed.';
        e.target.value = '';
        return;
      }

      uploadingAssignment = true;
      statusEl.textContent = 'Uploading PDF...';

      const { data:{ session } } = await sb.auth.getSession();
      if(!session?.user){
        statusEl.textContent = 'Login required before upload.';
        uploadingAssignment = false;
        e.target.value = '';
        return;
      }

      const uid = session.user.id;
      const filePath = `${uid}/${EXPERIMENT_ID}/${Date.now()}.pdf`;

      const { error: upErr } = await sb.storage.from(ASSIGNMENT_BUCKET).upload(
        filePath, file, { upsert:true, contentType:'application/pdf' }
      );
      if(upErr){
        statusEl.textContent = 'Upload failed: ' + upErr.message;
        uploadingAssignment = false;
        return;
      }

      const { data: urlData } = sb.storage.from(ASSIGNMENT_BUCKET).getPublicUrl(filePath);
      uploadedAssignmentPath = filePath;
      uploadedAssignmentUrl  = urlData?.publicUrl || null;
      uploadingAssignment = false;
      statusEl.textContent = 'PDF uploaded successfully.';
    });

    // ---- Submission ----
    document.getElementById('assessmentForm').onsubmit = async function(e){
      e.preventDefault();
      const errEl = document.getElementById('errorMsg');
      const resEl = document.getElementById('resultMsg');
      const submitBtn = document.getElementById('submitBtn');
      errEl.textContent = '';
      resEl.textContent = '';

      if(!uploadedAssignmentPath){
        errEl.textContent = uploadingAssignment
          ? 'Please wait: assignment is still uploading...'
          : 'Please upload the assignment PDF before submitting.';
        return;
      }

      const form = e.target;

      let allAnswered = true;
      const answers = [];
      for(let i=0; i<questions.length; i++){
        const q = questions[i];
        if(['mcq','dropdown'].includes(q.type)){
          const v = form[`q${i}`]?.value?.trim() || '';
          if(!v) allAnswered = false;
          answers.push(v);
        } else if(q.type === 'image-labels'){
          const labelVals = [];
          for(let lid=0; lid<q.labels.length; lid++){
            const v = form[`q${i}_label${lid}`]?.value?.trim() || '';
            if(!v) allAnswered = false;
            labelVals.push(v);
          }
          answers.push(labelVals.join('; '));
        }
      }

      if(!allAnswered){
        errEl.textContent = 'Please answer all questions.';
        return;
      }
      if(!form.declaration.checked){
        errEl.textContent = 'You must agree to the declaration.';
        return;
      }

      // Scoring
      let marks = 0;
      let maxMarks = 0;
      for(let i=0; i<questions.length; i++){
        const q = questions[i];
        if(['mcq','dropdown'].includes(q.type)){
          maxMarks += 1;
          if(answers[i] === q.answer) marks++;
        } else if(q.type === 'image-labels'){
          maxMarks += q.labels.length;
          const parts = answers[i].split(';').map(s => s.trim());
          q.labels.forEach((label, lid) => {
            if(parts[lid] && parts[lid] === label.answer) marks++;
          });
        }
      }

      submitBtn.disabled = true;
      resEl.textContent = `Submitting your attempt (${marks}/${maxMarks})...`;

      const { data:{ session } } = await sb.auth.getSession();
      if(!session?.user){
        alert('Please log in so your result is stored.');
        window.location.href = '../login_Version4.html';
        return;
      }
      const uid = session.user.id;

      // Breakdown for result page
      const breakdown = [];
      for(let i=0; i<questions.length; i++){
        const q = questions[i];
        if(['mcq','dropdown'].includes(q.type)){
          breakdown.push({
            question: q.text,
            type: q.type,
            answer: answers[i],
            correct: q.answer,
            isCorrect: answers[i] === q.answer
          });
        } else if(q.type === 'image-labels'){
          const parts = answers[i].split(';').map(s=>s.trim());
          q.labels.forEach((label, lid) => {
            breakdown.push({
              question: `Q10 (Label ${label.name})`,
              type: 'image-label',
              answer: parts[lid],
              correct: label.answer,
              isCorrect: parts[lid] === label.answer
            });
          });
        }
      }
      breakdown.push({
        type: 'meta',
        assignment: {
          bucket: ASSIGNMENT_BUCKET,
          path: uploadedAssignmentPath,
          publicUrl: uploadedAssignmentUrl || null
        }
      });

      const durationSec = Math.round((Date.now() - pageStartTime)/1000);

      const row = {
        user_id: uid,
        user_name: form.studentName.value.trim(),
        experiment_id: EXPERIMENT_ID,
        score: marks,
        total: maxMarks,
        submitted_at: new Date().toISOString(),
        duration_sec: durationSec,
        breakdown,
        meta: {
          email: form.emailId.value.trim(),
          prn: form.prnNumber.value.trim(),
          batch: form.batchNumber.value.trim(),
          school_name: form.schoolName.value.trim(),
          assessment_title: ASSESSMENT_TITLE
        },
        assignment_bucket: ASSIGNMENT_BUCKET,
        assignment_path: uploadedAssignmentPath
      };

      const { error } = await sb.from('assessment_results').insert(row);
      if(error){
        console.error('Supabase insert error:', error);
        errEl.textContent = 'Could not save result. Please retry.';
        submitBtn.disabled = false;
        return;
      }

      window.location.href = `../result.html?exp=${encodeURIComponent(EXPERIMENT_ID)}`;
    };
  </script>
</body>
</html>
