<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Human Anatomy & Physiology Portal</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="icon"
    href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="28" fill="%231565c0"/><text x="32" y="39" font-size="28" text-anchor="middle" fi[...]
  />

  <style>
    /* ─── Design Tokens ─────────────────────────────────────── */
    :root {
      --blue:        #1565c0;
      --blue-dark:   #0d47a1;
      --blue-deeper: #1a237e;
      --blue-light:  #e3f2fd;
      --blue-mid:    #bbdefb;
      --ink:         #1a2233;
      --ink-soft:    #3a4a6b;
      --muted:       #6b7da6;
      --chip-bg:     #e8f1ff;
      --chip-bd:     #c5d8f8;
      --card-bg:     #ffffff;
      --page-bg:     #f0f4fb;
      --sidebar-w:   240px;
      --header-h:    64px;
      --shadow:      0 4px 24px rgba(13,37,80,.13);
      --shadow-soft: 0 2px 10px rgba(13,37,80,.09);
      --radius:      14px;
      --radius-sm:   9px;
    }

    /* ─── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, Arial, sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: var(--page-bg);
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    /* ─── Background wallpaper ──────────────────────────────── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: url('wallpaper.jpg') no-repeat center center / cover;
      opacity: 0.08;
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════════════
       TOP HEADER BAR
    ═══════════════════════════════════════════════════════════ */
    .top-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: linear-gradient(135deg, var(--blue-deeper) 0%, var(--blue-dark) 60%, var(--blue) 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px 0 20px;
      z-index: 200;
      box-shadow: 0 2px 18px rgba(13,37,80,.22);
    }
    .top-header__brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .top-header__logo-icon {
      width: 38px; height: 38px;
      background: rgba(255,255,255,.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,.2);
    }
    .top-header__title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .3px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-header__subtitle {
      color: rgba(255,255,255,.65);
      font-size: .75rem;
      font-weight: 400;
      letter-spacing: .2px;
    }
    .top-header__actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .hdr-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-size: .87rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    .hdr-btn:hover { background: rgba(255,255,255,.22); transform: translateY(-1px); }
    .hdr-btn--accent {
      background: rgba(255,255,255,.95);
      color: var(--blue-dark);
      border-color: transparent;
    }
    .hdr-btn--accent:hover { background: #fff; }
    .hdr-avatar-wrap {
      width: 36px; height: 36px;
      border-radius: 9px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.1);
      flex-shrink: 0;
      cursor: pointer;
    }
    .hdr-avatar-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ═══════════════════════════════════════════════════════════
       LAYOUT SHELL  (sidebar + main)
    ═══════════════════════════════════════════════════════════ */
    .layout {
      display: flex;
      min-height: 100vh;
      padding-top: var(--header-h);
    }

    /* ─── Sidebar ───────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: linear-gradient(180deg, var(--blue-deeper) 0%, #162c6b 100%);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: var(--header-h);
      left: 0;
      bottom: 0;
      z-index: 100;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px 0 32px 0;
      box-shadow: 3px 0 20px rgba(13,37,80,.13);
    }
    .sidebar-section-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(255,255,255,.38);
      padding: 18px 20px 6px 20px;
    }
    .sidebar-section-label:first-child { padding-top: 4px; }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 20px;
      color: rgba(255,255,255,.75);
      font-size: .93rem;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: background .18s, color .18s, border-color .18s;
      cursor: pointer;
      white-space: nowrap;
    }
    .sidebar-link:hover,
    .sidebar-link.active {
      background: rgba(255,255,255,.1);
      color: #fff;
      border-left-color: #64b5f6;
    }
    .sidebar-link .s-icon {
      font-size: 1.1rem;
      width: 22px;
    }
  </style>
</head>

<body>
  <!-- ── TOP HEADER ── -->
  <header class="top-header">
    <div class="top-header__brand">
      <div class="top-header__logo-icon">🫀</div>
      <div>
        <div class="top-header__title">Anatomy &amp; Physiology Portal</div>
        <div class="top-header__subtitle">Learning Management System</div>
      </div>
    </div>

    <div class="top-header__actions">
      <button id="login-btn" class="hdr-btn hdr-btn--accent">Sign In</button>
      <div class="hdr-avatar-wrap" id="hdr-avatar">
        <img id="hdr-avatar-img" alt="Avatar" />
      </div>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════
       LAYOUT  (sidebar + main)
  ══════════════════════════════════════════════════════ -->
  <div class="layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" role="navigation" aria-label="Site navigation">

      <div class="sidebar-section-label">Main</div>
      <a href="index.html"       class="sidebar-link active"><span class="s-icon">🏠</span> Dashboard</a>
      <a href="experiments.html" class="sidebar-link"><span class="s-icon">🧪</span> Experiments</a>
      <a href="assessments.html" class="sidebar-link"><span class="s-icon">📋</span> Assessments</a>
      <a href="references.html"  class="sidebar-link"><span class="s-icon">📖</span> References</a>

    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="main-content" id="main-content">
      <!-- Your main content goes here -->
    </main>

  </div>

</body>
</html>
